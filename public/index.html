<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hackathon - Submit proyek tim kamu!">
    <title>Hackathon - Peserta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>

    <div class="particles" id="particles"></div>

    <div class="main-content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <span class="brand-icon">🚀</span> HackManager
                </a>
                <a href="/admin" class="btn btn-outline-glass btn-sm ms-auto">
                    <i class="bi bi-shield-lock"></i> Admin
                </a>
            </div>
        </nav>

        <div class="container py-4">
            <!-- Countdown Timer -->
            <div class="glass-card mb-4">
                <div class="countdown-section" id="countdownSection">
                    <div class="countdown-title">Waktu Tersisa</div>
                    <div class="hackathon-name" id="hackathonName">Hackathon 2026</div>
                    <div class="countdown-container" id="countdownContainer">
                        <div class="countdown-box">
                            <div class="countdown-value" id="countDays">00</div>
                            <div class="countdown-label">Hari</div>
                        </div>
                        <div class="countdown-box">
                            <div class="countdown-value" id="countHours">00</div>
                            <div class="countdown-label">Jam</div>
                        </div>
                        <div class="countdown-box">
                            <div class="countdown-value" id="countMinutes">00</div>
                            <div class="countdown-label">Menit</div>
                        </div>
                        <div class="countdown-box">
                            <div class="countdown-value" id="countSeconds">00</div>
                            <div class="countdown-label">Detik</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submission Form -->
            <div class="glass-card mb-4">
                <div class="card-header-custom">
                    <div class="header-icon"><i class="bi bi-send-fill"></i></div>
                    <h5>Submit Proyek Tim Kamu</h5>
                </div>
                <form id="submissionForm" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nama Tim *</label>
                            <input type="text" class="form-control" id="teamName" name="team_name"
                                placeholder="Nama tim kamu" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Anggota Tim *</label>
                            <input type="text" class="form-control" id="members" name="members"
                                placeholder="Pisahkan dengan koma" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Judul Proyek *</label>
                            <input type="text" class="form-control" id="projectTitle" name="project_title"
                                placeholder="Judul proyek" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Link Demo</label>
                            <input type="url" class="form-control" id="demoLink" name="demo_link"
                                placeholder="https://...">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Deskripsi Singkat</label>
                            <textarea class="form-control" id="description" name="description" rows="3"
                                placeholder="Jelaskan proyek kamu secara singkat..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Upload File</label>
                            <div class="file-upload-area" id="fileUploadArea">
                                <input type="file" id="fileUpload" name="file" class="file-upload-input">
                                <div class="file-upload-content" id="fileUploadContent">
                                    <i class="bi bi-cloud-arrow-up"></i>
                                    <span>Drag & drop file atau <strong>klik untuk pilih</strong></span>
                                    <small>Maks. 50MB</small>
                                </div>
                                <div class="file-upload-preview" id="fileUploadPreview" style="display:none">
                                    <i class="bi bi-file-earmark-check"></i>
                                    <div class="file-upload-info">
                                        <span class="file-name" id="fileName"></span>
                                        <small class="file-size" id="fileSize"></small>
                                    </div>
                                    <button type="button" class="btn-clear-file" id="clearFile" title="Hapus file">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Verifikasi Captcha *</label>
                            <div class="captcha-wrapper">
                                <div class="captcha-image-wrapper">
                                    <img id="captchaImage" src="/api/captcha" alt="captcha" class="captcha-image">
                                    <button type="button" class="btn-refresh-captcha" id="refreshCaptcha"
                                        title="Refresh captcha">
                                        <i class="bi bi-arrow-clockwise"></i>
                                    </button>
                                </div>
                                <input type="text" class="form-control mt-2" id="captchaAnswer" name="captcha_answer"
                                    placeholder="Jawaban = ?" required>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-gradient mt-3" id="submitBtn">
                        <i class="bi bi-send-fill"></i> Submit Proyek
                    </button>
                </form>
            </div>

            <!-- Submitted Teams (Read-only List) -->
            <div class="glass-card">
                <div class="card-header-custom">
                    <div class="header-icon"><i class="bi bi-people-fill"></i></div>
                    <h5>Tim yang Sudah Submit</h5>
                </div>
                <div id="teamsList">
                    <div class="empty-state" id="emptyTeams">
                        <i class="bi bi-inbox"></i>
                        <p>Belum ada submission. Jadilah yang pertama! 🎯</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
